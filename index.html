<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Tailwind Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          darkMode: 'class',
        }
    </script>
</head>
<body class="transition-colors duration-300">

    <button id="theme-toggle" onclick="toggleTheme()" 
        class="fixed top-5 right-5 w-[45px] h-[45px] rounded-full bg-white dark:bg-slate-700 shadow-lg cursor-pointer z-[1000] flex items-center justify-center text-xl hover:scale-110 transition-transform border-none outline-none">
        🌙
    </button>

    <div class="w-full min-h-screen bg-gradient-to-br from-[#153677] to-[#4e085f] p-[10px]">
        
        <div class="w-[95%] max-w-[540px] lg:max-w-[900px] bg-white dark:bg-slate-800 mx-auto mt-[50px] mb-5 p-[40px_30px_70px] rounded-xl shadow-2xl transition-all duration-300">
            
            <h1 class="text-black dark:text-white flex items-center justify-center mb-[25px] text-[28px] font-bold uppercase">
                LISTA DE TAREAS <img src="images/icon.png" class="w-[30px] ml-[10px]">
            </h1>
            
            <div class="flex items-center justify-between bg-[#f4f7ff] dark:bg-slate-700 rounded-[30px] pl-5 mb-[25px] border border-[#e0e0e0] dark:border-slate-600 overflow-hidden">
                <input type="text" id="input-box" placeholder="Escribe una tarea..." 
                    class="flex-1 border-none outline-none bg-transparent py-[15px] px-[10px] text-[16px] text-[#333] dark:text-white placeholder:text-gray-400">
                
                <select id="category-select" 
                    class="p-[10px_15px] border-none outline-none bg-[#f4f7ff] dark:bg-slate-700 text-[14px] text-black dark:text-gray-300 cursor-pointer font-semibold border-l border-[#e0e0e0] dark:border-slate-600 appearance-none hover:bg-gray-200 dark:hover:bg-slate-600 transition-colors">
                    <option value="General">General</option>
                    <option value="Trabajo">Trabajo</option>
                    <option value="Personal">Personal</option>
                    <option value="Urgente">Urgente</option>
                </select>
                
                <button onclick="addTask()" 
                    class="border-2 border-[#ff5945] bg-white dark:bg-slate-800 text-[#ff5945] py-[16px] px-[40px] text-[16px] font-bold cursor-pointer rounded-[40px] transition-all duration-300 hover:bg-[#ff5945] hover:text-white">
                    Añadir
                </button>
            </div>

            <ul id="list-container" class="mt-5"></ul>

            <button id="complete-all" onclick="completeAllTasks()" 
                class="w-full mt-[15px] border-2 border-[#ff5945] bg-white dark:bg-slate-800 text-[#ff5945] py-[16px] px-[40px] text-[16px] font-bold rounded-[40px] transition-all duration-300 hover:bg-[#ff5945] hover:text-white flex items-center justify-center">
                Marcar todas como hechas
            </button>

            <div class="mt-5 p-[15px] bg-[#fafafa] dark:bg-slate-700 rounded-xl flex justify-around border border-[#eee] dark:border-slate-600 md:flex-row flex-col gap-4">
                <p class="text-[13px] text-[#555] dark:text-gray-300 text-center flex justify-between md:block w-full md:w-auto px-2 md:px-0">
                    Total: <span id="total-tasks" class="block md:inline font-bold text-[18px] text-black dark:text-white">0</span>
                </p>
                <p class="text-[13px] text-[#555] dark:text-gray-300 text-center flex justify-between md:block w-full md:w-auto px-2 md:px-0">
                    Completadas: <span id="completed-tasks" class="block md:inline font-bold text-[18px] text-black dark:text-white">0</span>
                </p>
                <p class="text-[13px] text-[#555] dark:text-gray-300 text-center flex justify-between md:block w-full md:w-auto px-2 md:px-0">
                    Pendientes: <span id="pending-tasks" class="block md:inline font-bold text-[18px] text-black dark:text-white">0</span>
                </p>
            </div>

            <div class="filters flex justify-center gap-2 my-5">
                <button id="filter-all" onclick="filterTasks('all')" 
                    class="filter-btn px-4 py-1.5 text-xs font-semibold rounded-full border transition-all duration-300 outline-none bg-white text-[#555] border-[#ddd] hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-300 dark:border-slate-600">
                    Todas
                </button>
                <button id="filter-pending" onclick="filterTasks('pending')" 
                    class="filter-btn px-4 py-1.5 text-xs font-semibold rounded-full border transition-all duration-300 outline-none bg-white text-[#555] border-[#ddd] hover:bg-[#f0f0f0] dark:bg-slate-700 dark:text-gray-300 dark:border-slate-600">
                    Pendientes
                </button>
                <button id="filter-completed" onclick="filterTasks('completed')" 
                    class="filter-btn px-4 py-1.5 text-xs font-semibold rounded-full border transition-all duration-300 outline-none bg-white text-[#555] border-[#ddd] hover:bg-[#f0f0f0] dark:bg-slate-700 dark:text-gray-300 dark:border-slate-600">
                    Hechas
                </button>
            </div>

            <button id="clear-all" onclick="clearAll()" 
                class="w-full mt-[15px] border-2 border-[#ff5945] bg-white dark:bg-slate-800 text-[#ff5945] py-[16px] px-[40px] text-[16px] font-bold rounded-[40px] transition-all duration-300 hover:bg-[#ff5945] hover:text-white flex items-center justify-center">
                Eliminar Todo
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
